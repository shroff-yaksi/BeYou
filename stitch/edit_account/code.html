<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Account - BeYou</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13", // Derived from theme but override requested primary is #6358E1 - adjusting to system request primary
                        "primary-custom": "#6358E1",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .settings-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-4 py-6 bg-transparent">
<button class="flex items-center justify-center text-primary-custom">
<span class="material-symbols-outlined !text-[24px]">arrow_back_ios_new</span>
</button>
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Edit account</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="max-w-md mx-auto px-6 pb-20">
<!-- Profile Image Section -->
<div class="flex flex-col items-center mt-4 mb-8">
<div class="relative">
<div class="w-32 h-32 rounded-full overflow-hidden border-4 border-white dark:border-slate-800 shadow-lg bg-slate-200" data-alt="User profile picture in a circle" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCqE16Q8IOWsVIM7wRXTil_xEZYyaWnL0tUnygZoPBjdy_eedXvUVXMYc5gqiDFHuYBQ14Gwwgx-roU-8NjdDxmjGxgsa6OUSpwvQrIjALngrwqF77ajAtfsZzs-UdQbXF1ccB6ucTV0uDl5HU-DxtV7tl46QRDcx-pcd_QWbWY-l4wHo_MXKqNmtmbcOCSU3k9TOIAB8fSTFz_fzOnmztfBiAdPcwE0R3WLlMPnhg9qxKGBZH_B-i0RRd-siw5C9-xdEr-02LJyZs');">
</div>
</div>
<button class="mt-4 text-[18px] font-bold text-primary-custom bg-transparent border-none">
                Edit photo
            </button>
</div>
<!-- Full Name Section -->
<div class="mb-6">
<label class="block text-slate-700 dark:text-slate-300 font-semibold mb-2 ml-1">Full name</label>
<div class="settings-shadow rounded-[40px] bg-white dark:bg-slate-800 overflow-hidden px-6 py-1">
<input class="w-full border-none bg-transparent focus:ring-0 text-slate-900 dark:text-slate-100 h-14 placeholder:text-slate-400" placeholder="Enter your full name" type="text" value=""/>
</div>
</div>
<!-- Email Section -->
<div class="mb-8">
<label class="block text-slate-700 dark:text-slate-300 font-semibold mb-2 ml-1">Email</label>
<div class="settings-shadow rounded-[40px] bg-white dark:bg-slate-800 overflow-hidden px-6 py-1">
<input class="w-full border-none bg-transparent focus:ring-0 text-slate-900 dark:text-slate-100 h-14 placeholder:text-slate-400" placeholder="example@mail.com" type="email" value=""/>
</div>
</div>
<!-- Change Password Link -->
<div class="mb-12">
<button class="flex items-center justify-between w-full px-2 py-3 active:bg-primary-custom/10 rounded-xl transition-colors">
<span class="text-[18px] font-semibold text-primary-custom">Change Password</span>
<span class="material-symbols-outlined text-primary-custom !text-[20px]">arrow_forward_ios</span>
</button>
</div>
<!-- Save Button -->
<div class="fixed bottom-8 left-0 right-0 px-6 max-w-md mx-auto">
<button class="w-full bg-primary-custom text-white py-4 rounded-full font-bold text-[18px] shadow-lg shadow-primary-custom/30 hover:brightness-110 active:scale-[0.98] transition-all">
                Save
            </button>
</div>
</main>
</body></html>
