<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6358E1",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Dosha Assessment - Question 1</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 bg-background-light dark:bg-background-dark border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-between p-4 max-w-2xl mx-auto">
<div class="flex items-center gap-3">
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">close</span>
</button>
<h1 class="text-lg font-bold leading-tight tracking-tight">Assessment . Ananya Sharma</h1>
</div>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">refresh</span>
</button>
</div>
</header>
<main class="max-w-2xl mx-auto p-6 flex flex-col gap-6">
<!-- Progress Section -->
<div class="flex flex-col gap-3">
<div class="flex justify-between items-end">
<span class="text-base font-semibold text-slate-900 dark:text-slate-100">Question 1/21</span>
<span class="text-sm font-medium text-primary">5% Complete</span>
</div>
<!-- Progress Bar -->
<div class="w-full bg-primary/20 rounded-full h-1.5 overflow-hidden">
<div class="bg-primary h-full rounded-full transition-all duration-300" style="width: 5%;"></div>
</div>
</div>
<!-- Category Badge -->
<div class="flex">
<span class="bg-primary/10 text-primary px-4 py-1.5 rounded-full text-sm font-semibold tracking-wide uppercase">
                Physical
            </span>
</div>
<!-- Question Title -->
<h2 class="text-2xl font-bold leading-tight text-slate-900 dark:text-slate-100">
            How would you describe your physical frame and build?
        </h2>
<!-- Options List -->
<div class="flex flex-col gap-4">
<!-- Selected Option -->
<label class="relative flex items-center gap-4 rounded-xl border-2 border-primary p-5 cursor-pointer bg-primary/5 transition-all">
<input checked="" class="h-5 w-5 border-2 border-slate-300 text-primary focus:ring-primary focus:ring-offset-0 bg-transparent checked:bg-primary" name="frame_build" type="radio"/>
<div class="flex flex-col">
<span class="text-base font-semibold text-slate-900 dark:text-slate-100 leading-tight">Slender, light-boned, or prominent joints</span>
<span class="text-sm text-slate-600 dark:text-slate-400 mt-1">Typical of Vata constitution; quick-moving and agile.</span>
</div>
</label>
<!-- Normal Option -->
<label class="relative flex items-center gap-4 rounded-xl border border-slate-200 dark:border-slate-800 p-5 cursor-pointer hover:border-primary/50 transition-all">
<input class="h-5 w-5 border-2 border-slate-300 dark:border-slate-700 text-primary focus:ring-primary focus:ring-offset-0 bg-transparent checked:bg-primary" name="frame_build" type="radio"/>
<div class="flex flex-col">
<span class="text-base font-semibold text-slate-900 dark:text-slate-100 leading-tight">Medium build, well-developed muscles</span>
<span class="text-sm text-slate-600 dark:text-slate-400 mt-1">Typical of Pitta constitution; balanced and proportional.</span>
</div>
</label>
<!-- Normal Option -->
<label class="relative flex items-center gap-4 rounded-xl border border-slate-200 dark:border-slate-800 p-5 cursor-pointer hover:border-primary/50 transition-all">
<input class="h-5 w-5 border-2 border-slate-300 dark:border-slate-700 text-primary focus:ring-primary focus:ring-offset-0 bg-transparent checked:bg-primary" name="frame_build" type="radio"/>
<div class="flex flex-col">
<span class="text-base font-semibold text-slate-900 dark:text-slate-100 leading-tight">Large frame, sturdy, or heavy-set</span>
<span class="text-sm text-slate-600 dark:text-slate-400 mt-1">Typical of Kapha constitution; strong and solid build.</span>
</div>
</label>
</div>
<!-- Navigation Row -->
<div class="flex items-center justify-between mt-8 pt-6 border-t border-slate-200 dark:border-slate-800">
<button class="px-6 py-3 rounded-xl border border-slate-300 dark:border-slate-700 font-bold text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">chevron_left</span>
                Previous
            </button>
<button class="px-8 py-3 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/25 hover:bg-primary/90 transition-all flex items-center gap-2">
                Next Question
                <span class="material-symbols-outlined text-[20px]">chevron_right</span>
</button>
</div>
</main>
<!-- Decorative Element -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary/20 via-primary to-primary/20 opacity-20"></div>
</body></html>
