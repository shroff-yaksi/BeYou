<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BeYou - Reminder</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .cupertino-picker-mask {
            background: linear-gradient(to bottom, 
                rgba(248, 246, 246, 1) 0%, 
                rgba(248, 246, 246, 0) 40%, 
                rgba(248, 246, 246, 0) 60%, 
                rgba(248, 246, 246, 1) 100%);
        }
        .dark .cupertino-picker-mask {
            background: linear-gradient(to bottom, 
                rgba(34, 22, 16, 1) 0%, 
                rgba(34, 22, 16, 0) 40%, 
                rgba(34, 22, 16, 0) 60%, 
                rgba(34, 22, 16, 1) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen text-slate-900 dark:text-slate-100">
<div class="max-w-md mx-auto min-h-screen flex flex-col">
<!-- AppBar -->
<header class="flex items-center justify-between px-4 py-4 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<button class="flex items-center justify-center p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Reminder</h1>
<button class="text-primary font-bold px-4 py-2 hover:bg-primary/10 rounded-lg transition-colors">
                Save
            </button>
</header>
<main class="flex-1 px-4 py-6 space-y-8">
<!-- Time Selection Section -->
<section>
<h2 class="text-[18px] font-semibold mb-6">Please select reminder time</h2>
<!-- Cupertino-style Time Picker -->
<div class="relative h-[250px] overflow-hidden flex justify-center items-center bg-slate-100/50 dark:bg-slate-800/30 rounded-xl">
<!-- Highlight bar -->
<div class="absolute inset-x-0 h-12 bg-primary/10 border-y border-primary/20 pointer-events-none"></div>
<div class="flex w-full px-8 justify-around relative">
<!-- Hours -->
<div class="flex flex-col items-center gap-4">
<span class="text-slate-400 dark:text-slate-500 text-xl">09</span>
<span class="text-slate-400 dark:text-slate-500 text-xl">10</span>
<span class="text-primary text-2xl font-bold">11</span>
<span class="text-slate-400 dark:text-slate-500 text-xl">12</span>
<span class="text-slate-400 dark:text-slate-500 text-xl">01</span>
</div>
<!-- Minutes -->
<div class="flex flex-col items-center gap-4">
<span class="text-slate-400 dark:text-slate-500 text-xl">20</span>
<span class="text-slate-400 dark:text-slate-500 text-xl">25</span>
<span class="text-primary text-2xl font-bold">30</span>
<span class="text-slate-400 dark:text-slate-500 text-xl">35</span>
<span class="text-slate-400 dark:text-slate-500 text-xl">40</span>
</div>
<!-- Period -->
<div class="flex flex-col items-center gap-4">
<span class="text-slate-400 dark:text-slate-500 text-xl invisible">AM</span>
<span class="text-slate-400 dark:text-slate-500 text-xl">AM</span>
<span class="text-primary text-2xl font-bold">PM</span>
<span class="text-slate-400 dark:text-slate-500 text-xl invisible">PM</span>
<span class="text-slate-400 dark:text-slate-500 text-xl invisible">PM</span>
</div>
</div>
<!-- Gradient Masks -->
<div class="absolute inset-0 cupertino-picker-mask pointer-events-none"></div>
</div>
</section>
<!-- Repeating Section -->
<section class="space-y-4">
<h2 class="text-[18px] font-semibold">How often repeat</h2>
<div class="flex flex-wrap gap-3">
<!-- Preset Selection Chips -->
<button class="bg-primary text-white rounded-full px-[15px] py-[7px] text-sm font-medium transition-colors">
                        Everyday
                    </button>
<button class="bg-slate-500/10 text-slate-500 dark:text-slate-400 rounded-full px-[15px] py-[7px] text-sm font-medium hover:bg-slate-500/20 transition-colors">
                        Mon - Fri
                    </button>
<button class="bg-slate-500/10 text-slate-500 dark:text-slate-400 rounded-full px-[15px] py-[7px] text-sm font-medium hover:bg-slate-500/20 transition-colors">
                        Weekends
                    </button>
<!-- Divider for clarity -->
<div class="w-full h-px bg-slate-200 dark:bg-slate-700 my-1"></div>
<!-- Individual Day Chips -->
<button class="bg-slate-500/10 text-slate-500 dark:text-slate-400 rounded-full px-[15px] py-[7px] text-sm font-medium hover:bg-slate-500/20 transition-colors">
                        Monday
                    </button>
<button class="bg-slate-500/10 text-slate-500 dark:text-slate-400 rounded-full px-[15px] py-[7px] text-sm font-medium hover:bg-slate-500/20 transition-colors">
                        Tue
                    </button>
<button class="bg-slate-500/10 text-slate-500 dark:text-slate-400 rounded-full px-[15px] py-[7px] text-sm font-medium hover:bg-slate-500/20 transition-colors">
                        Wed
                    </button>
<button class="bg-slate-500/10 text-slate-500 dark:text-slate-400 rounded-full px-[15px] py-[7px] text-sm font-medium hover:bg-slate-500/20 transition-colors">
                        Thu
                    </button>
<button class="bg-slate-500/10 text-slate-500 dark:text-slate-400 rounded-full px-[15px] py-[7px] text-sm font-medium hover:bg-slate-500/20 transition-colors">
                        Fri
                    </button>
<button class="bg-slate-500/10 text-slate-500 dark:text-slate-400 rounded-full px-[15px] py-[7px] text-sm font-medium hover:bg-slate-500/20 transition-colors">
                        Sat
                    </button>
<button class="bg-slate-500/10 text-slate-500 dark:text-slate-400 rounded-full px-[15px] py-[7px] text-sm font-medium hover:bg-slate-500/20 transition-colors">
                        Sun
                    </button>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="border-t border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark pb-6 pt-2">
<div class="flex justify-around items-end">
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Home</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">favorite</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Wellness</p>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-[1]">alarm</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Reminders</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Profile</p>
</a>
</div>
</nav>
</div>
</body></html>
