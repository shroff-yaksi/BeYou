<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Change Password - BeYou</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6358E1",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "text-black": "#1F2022",
                        "grey-custom": "#B6BDC6",
                        "field-bg": "#FBFCFF"
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "pill": "40px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .settings-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display">
<div class="relative flex h-screen w-full flex-col max-w-md mx-auto overflow-hidden">
<!-- TopAppBar -->
<header class="flex items-center bg-transparent p-4 justify-between shrink-0">
<button aria-label="Go back" class="text-primary flex size-12 items-center justify-start focus:outline-none">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</button>
<h1 class="text-text-black dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">
                Change Password
            </h1>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-5 pt-5 pb-8 overflow-y-auto">
<div class="flex flex-col gap-6">
<!-- New Password Section -->
<div class="flex flex-col gap-2">
<label class="text-text-black dark:text-slate-200 text-sm font-semibold ml-2">
                        New password
                    </label>
<div class="settings-shadow rounded-pill bg-white dark:bg-slate-800 flex items-center px-6 py-1 h-16 border border-transparent focus-within:border-primary/30 transition-all">
<input class="flex-1 bg-transparent border-none focus:ring-0 text-text-black dark:text-slate-100 placeholder:text-grey-custom text-base" placeholder="Must be at least 6 symbols" type="password"/>
<span class="material-symbols-outlined text-grey-custom cursor-pointer">visibility_off</span>
</div>
</div>
<!-- Confirm Password Section -->
<div class="flex flex-col gap-2">
<label class="text-text-black dark:text-slate-200 text-sm font-semibold ml-2">
                        Confirm password
                    </label>
<div class="settings-shadow rounded-pill bg-white dark:bg-slate-800 flex items-center px-6 py-1 h-16 border border-transparent focus-within:border-primary/30 transition-all">
<input class="flex-1 bg-transparent border-none focus:ring-0 text-text-black dark:text-slate-100 placeholder:text-grey-custom text-base" placeholder="Re-enter password" type="password"/>
<span class="material-symbols-outlined text-grey-custom cursor-pointer">visibility_off</span>
</div>
</div>
</div>
<!-- Spacer to push button to bottom -->
<div class="flex-1"></div>
<!-- Save Button -->
<div class="mt-8">
<button class="w-full h-[55px] bg-primary hover:bg-primary/90 text-white rounded-full font-bold text-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center">
                    Save
                </button>
</div>
</main>
</div>
</body></html>
