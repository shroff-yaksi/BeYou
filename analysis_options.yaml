include: package:flutter_lints/flutter.yaml

analyzer:
  # Exclude legacy screens - they will be deleted after migration to features/
  exclude:
    - lib/screens/**

  errors:
    # Treat deprecated API usage as warnings, not errors
    deprecated_member_use: warning
    deprecated_member_use_from_same_package: warning

linter:
  rules:
    constant_identifier_names: false   # allows monday_friday style names
